---
version: "3.9"

name: "plex-reshare"

services:
  plex_reshare:
    image: "peterbuga/plex-reshare:latest"
    container_name: "plex_reshare"
    hostname: "plex_reshare"
    restart: "unless-stopped"
    env_file:
      - .env
    ports:
      # NOTE: 6379 (redis) intentionally NOT published -- it's internal only and runs
      # with protected-mode off; exposing it to the host network is a needless risk.
      - 8080:8080
      # - 8000:8000  # mapping to starlette, for debugging mostly
    logging:
      options:
        max-size: "5m"

    volumes:
      - "./:/pr"

      # enable for development (mount our forked code over the baked-in image)
      - "./app:/app"
      - "./rq:/rq"
      - "./nginx/nginx.vh.default.conf:/etc/nginx/conf.d/default.conf:ro"
      # - "./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro"
      # - "./supervisord.conf:/etc/supervisord.conf"
