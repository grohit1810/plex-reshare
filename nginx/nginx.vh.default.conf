server {
    listen       8080;
    listen  [::]:8080;
    server_name  plex-reshare;

    # https://stackoverflow.com/questions/22541333/have-nginx-access-log-and-error-log-log-to-stdout-and-stderr-of-master-process
    access_log /dev/stdout;

    # https://gist.github.com/CSRaghunandan/ce2394cd5a9c8a412f8ff5ee1478560a

    location / {
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://127.0.0.1:8000;
    }

    location ~ /(?<video_url>.*?\/(?<plex_id>.*?)/.*\.\w+)$ {
        set $plex_ip '';
        set $plex_port '';
        set $plex_token '';
        set $plex_url '';

        set_by_lua $redis_host 'return os.getenv("REDIS_HOST")';
        set_by_lua $redis_port 'return os.getenv("REDIS_PORT")';

        resolver            127.0.0.11 valid=60s;

        access_by_lua_block {
            local redis = require "resty.redis"
            local red = redis:new()

            red:set_timeouts(1000, 1000, 1000) -- 1 sec
            local ok, err = red:connect(ngx.var.redis_host, tonumber(ngx.var.redis_port))
            local redisdb = tonumber(ngx.var.redis_db)
            red:select(11)

            local plex_ip, err = red:get("pr:node:" .. ngx.var.plex_id .. ":ip");
            local plex_port, err = red:get("pr:node:" .. ngx.var.plex_id .. ":port");
            local plex_token, err = red:get("pr:node:" .. ngx.var.plex_id .. ":token");
            local files_val, err = red:get("pr:files:" .. ngx.var.video_url);

            red:close()

            -- NIL-CHECK (fixes the "userdata: NULL" malformed-URL bug): if any lookup
            -- missed (unknown/expired key, odd filename), resty returns ngx.null. Building
            -- proxy_pass from that yields a garbage upstream like ":32400userdata: NULL".
            -- Bail with a clean 404 instead of hammering the friend with a broken URL.
            if files_val == nil or files_val == ngx.null
               or plex_ip == nil or plex_ip == ngx.null
               or plex_token == nil or plex_token == ngx.null then
                return ngx.exit(404)
            end

            -- stored value is "<plex_url>|<size>" (size may be empty). Split it; if
            -- there is no pipe, treat the whole value as the url and leave size unset.
            local plex_url, size = files_val:match("^(.-)|(.*)$")
            if plex_url == nil then plex_url = files_val end

            -- Answer HEAD (the size probe rclone/Plex issue when listing a folder)
            -- LOCALLY from the stored size, so browsing/scanning the mount never
            -- round-trips to the origin server. Only an actual GET (playback) is
            -- proxied. This keeps folder listing fast and gentle on the source.
            if ngx.req.get_method() == "HEAD" and size ~= nil and size ~= "" then
                ngx.header["Content-Length"] = size
                ngx.header["Content-Type"] = "video/mp4"
                ngx.header["Accept-Ranges"] = "bytes"
                return ngx.exit(200)
            end

            ngx.var.plex_ip = plex_ip;
            ngx.var.plex_port = plex_port;
            ngx.var.plex_token = plex_token;
            ngx.var.plex_url = plex_url;

            -- stash for lazy-delete: the Redis listing key + the node/type/path the
            -- Python reconciler needs to also remove it from the SQLite source of truth.
            ngx.ctx.files_key = "pr:files:" .. ngx.var.video_url;      -- e.g. pr:files:movies/<node>/<path>
            ngx.ctx.rel = ngx.var.video_url;                           -- movies/<node>/<path>
        }

        # LAZY-DELETE (only on a definitive 404 from the friend). Runs in log phase via
        # a timer -- cosockets (Redis) are NOT allowed in header_filter, they ARE in a
        # timer. Fires ONLY on 404 (file truly gone), NEVER on 502/504/timeout (server
        # merely unreachable -> "unreachable != gone"). It drops the Redis key for an
        # instant R: effect AND pushes node|type|path to pr:lazydelete so the Python
        # reconciler removes the single row from SQLite too (else a restart resurrects
        # it). Deletes ONE item only -- never the whole show. Gated by LAZY_DELETE_ON_404.
        log_by_lua_block {
            if os.getenv("LAZY_DELETE_ON_404") ~= "true" then return end
            if ngx.status ~= 404 then return end
            local key = ngx.ctx.files_key
            local rel = ngx.ctx.rel
            if not key or not rel then return end
            -- rel = "<type>/<node>/<path...>"  ->  node|type|path
            local mtype, node, path = rel:match("^([^/]+)/([^/]+)/(.+)$")
            if not node then return end
            local host, port = ngx.var.redis_host, tonumber(ngx.var.redis_port)
            ngx.timer.at(0, function()
                local red = require("resty.redis"):new()
                red:set_timeouts(1000, 1000, 1000)
                if not red:connect(host, port) then return end
                red:select(11)
                red:del(key)
                red:rpush("pr:lazydelete", node .. "|" .. mtype .. "|" .. path)
                red:close()
            end)
        }

        proxy_pass  "https://$plex_ip:$plex_port$plex_url?X-Plex-Token=$plex_token";
    }
}
